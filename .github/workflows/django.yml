name: Secure Docker Publish

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r restaurant/requirements.txt

      - name: Security Scan (Bandit)
        run: |
          pip install bandit
          bandit -r . -x ./venv

      - name: Run Tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          AUTH_PASSWORD_VALIDATORS_LIST: ${{ secrets.AUTH_PASSWORD_VALIDATORS_LIST }}
        run: |
          python manage.py test

  build-and-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Scan Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/steakhouse:latest'
          format: 'table'
          exit-code: '1' # Fails build if "High" or "Critical" vulnerabilities are found
          severity: 'CRITICAL,HIGH'

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/steakhouse:latest
